server {
    listen 80;
    server_name tourfurr.camp www.tourfurr.camp;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tourfurr.camp www.tourfurr.camp;
    root DEPLOY_ROOT/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/CERT_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CERT_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Proxy Supabase Edge Functions through the local proxy server.
    # The proxy server bypasses geographic restrictions by routing
    # requests through this origin instead of calling Supabase directly.
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Authorization;
        proxy_pass_header apikey;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
